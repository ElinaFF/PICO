markdown: kramdown
title: MeDIC
logo: logo.png
favicon: favicon.ico
apple_touch_icon: logo.png
accent_image: /imgs/pexels-roman-odintsov-4871011.jpg
tagline: Metabolomic Dashboard for Interpretable Classification documentation

remote_theme: hydecorp/hydejack@v9.1.6
plugins:
- jekyll-remote-theme
- jekyll-include-cache
- jekyll-default-layout
- jekyll-feed
- jekyll-optional-front-matter
- jekyll-paginate
- jekyll-readme-index
- jekyll-redirect-from
- jekyll-relative-links
- jekyll-seo-tag
- jekyll-sitemap
- jekyll-titles-from-headings
- jekyll-last-modified-at

hydejack:
  no_search: false
permalink:             /:title/


kramdown:
  math_engine: mathjax
  math_engine_opts: {}

menu:
  - title: About
    url:   /about/
  - title: Installation
    url:   /installation_doc
  - title: Home
    url:   /home
  - title: Splits
    url:   /splits
  - title: Machine Learning
    url: /ml
  - title: Results
    url: /results
  - title: Results aggregated
    url: /resultsagg
  - title: Implementation
    url: /implementation

