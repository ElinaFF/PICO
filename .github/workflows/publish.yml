# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Publish to PyPI and Docker Hub

on:
  push:
    tags:        
      - '[0-9]+.[0-9]+.[0-9]+' # e.g. 0.1.4

jobs:
  publish-pypi:
    name: Upload a release to PyPI
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Hatch
      uses: pypa/hatch@install
    - name: Build the package
      run: hatch build
    - name: Publish the release
      run: hatch publish --user ${{ secrets.HATCH_INDEX_USER }} --auth ${{ secrets.HATCH_INDEX_AUTH }}

  publish-docker:
    name: Upload an image to Docker
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/medic:${{ github.ref_name }},${{ secrets.DOCKERHUB_USERNAME }}/medic:latest